    The accepted methane and ethane fit receipts bind deterministic
    evidence to explicit artifacts. The compact blocked binary receipt retains
    the exact rejected result and its immutable Regression/Migration provenance;
    its removed executable owners remain available only from Git history. Build
    trees, caches, temporary replay receipts, and wheels remain outside the
    repository.
  oversized_files:
    - path: src/epcsaft_regression/native/pure_saturation_fit.cpp
      physical_lines: 920
    - path: src/epcsaft_regression/records.py
      physical_lines: 870
    - path: src/epcsaft_regression/workflow.py
      physical_lines: 554
  oversized_file_policy: >-
    Checkpoint A adds one closed component record to the existing source owner
    without a second engine, registry, or result type. A later capability must
    not grow these files without a named ownership constraint and evidence that
    extraction reduces conceptual surface.

evidence_limits:
  methane_numerical_parity: frozen accepted parameters, costs, ranks, and nine reporting predictions
  fitted_parameter_rank_gate: solver acceptance requires all 3 fitted parameter columns
  confirmation_cost_agreement: symmetric relative difference with a 1e-8 maximum
  ethane_training_jacobian: centered directional residual check passed
  propane_training_jacobian: centered directional residual check passed
  propane_120_k: >-
    held-out reporting pressure closure remains above the frozen gate; exact
    callback replay is bit-identical and the continuous correction is below
    one local volume ULP, but no mixed-criterion atol is selected
  pressure_resolution_oracle: missing for the finite pure-parameter replay matrix
  pressure_resolution_protocol_effect: provenance-only-under-d023
  ethane_stress_100_k: reporting closure failed at the 1 Pa pressure floor
  reporting_jacobian_directional_check: absent; no runtime seam added
  held_out_accuracy_cutoff: none-approved
  global_identifiability: not-claimed
  uncertainty: not-claimed

excluded:
  - runtime binary interaction regression; the private dependency-gated contract grants no capability
  - association regression
  - electrolyte regression
  - reactive regression
  - generic regression families or target registries
  - alternate or numerical production derivative backends
  - provider source, private headers, or copied EOS equations
  - provider catalog persistence
  - predictive validation admission
  - runtime authority promotion for the local propane candidate

ratchet:
  rule: Every increase must serve one approved regression capability and keep EOS ownership in the provider.
  reject:
    - duplicate input or result representations
    - duplicate equation or derivative owners
    - sibling-source, lab, or migration runtime dependencies
    - hidden physical defaults, transforms, bounds, or solver gates
    - backend selectors, compatibility shims, or mutable target registries
