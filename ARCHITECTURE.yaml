    retained_propane_status: BLOCKED_CHECKPOINT_A_120_K_PRESSURE_CLOSURE
    retained_binary_status: BLOCKED_FROZEN_PRESSURE_CLOSURE
    active_migration_blocker: false
    binary_preflight_evidence: evidence/binary-kij-preflight.json
    binary_preflight_claim: >-
      The three declared converged equal-weight starts did not meet the 1e-8
      pressure-closure gate; no global infeasibility claim is supported.
    rejected_alternative_provenance:
      regression_commit: 47a2a8d9579a01347df7ccaa977337ad7d4047af
      receipt_subject_sha256: d51c9f0713b6a7355be719b6843e4459f41d46d16d973668d694715d36b63676
      migration_control_plane_commit: 4fd0e6eff5fd17399573132430d13c7e34626b98
    binary_problem:
      rows: 17
      variables: 35
      residuals: 68
      provider_coordinate_order: [methane_amount_mol, ethane_amount_mol, volume_m3, kij]
      derivative_order: 2
      required_full_rank: 35
      required_projected_parameter_rank: 1
      observed_fitted_kij: -0.008430339623289762
      observed_max_pressure_relative_closure: 0.022691483584976503
      required_max_pressure_relative_closure: 1.0e-8
    pressure_resolution_protocol:
      status: provenance-only-no-active-migration-effect
      formula: abs(P_phase - P_report) <= atol_resolution + 1.0e-8 * abs(P_observed)
      relative_term: 1.0e-8
      observed_pressure_meaning: magnitude scale only; not experimental uncertainty
      atol_resolution_pa: not-selected
      derivation: >-
        Smallest outward-rounded binary64 upper bound over an independently
        evaluated high-precision callback discrepancy, half-ULP volume-lattice
        pressure bound, reporting-pressure transform error, and subtraction
        rounding. The propane 120 K closure and experimental uncertainties are
        excluded from derivation.
      calibration: >-
        Every immutable methane and ethane row, every propane row except the
        locked 120 K challenge, using primary reporting states, existing
        confirmation outputs, and center/one-axis nextafter probes for phase
        volumes and common pressure.
      locked_challenge: glos2004-propane-sat-120-k
      binary_role: >-
        All 17 rows at the three frozen starts are challenge evidence only;
        they cannot derive or widen the pure candidate.
      provider_oracle: not-produced-and-not-active-under-d023
      validation_campaign: not-run-and-not-active-under-d023
      runtime_effect: none
      receipt_effect: none
      authority_effect: none
    authority_effect: none

