    status: dependency-gated-authority-neutral
    public_exports: []
    checkpoint_order: [propane-pure-saturation, methane-ethane-constant-kij]
    propane_gate: READY_WAITING_PROPANE_PRIMARY_SOURCE_PACKET
    binary_gate: READY_WAITING_PROVIDER_CORRECTION
    binary_problem:
      rows: 17
      variables: 35
      residuals: 68
      provider_coordinate_order: [methane_amount_mol, ethane_amount_mol, volume_m3, kij]
      derivative_order: 2
      required_full_rank: 35
      required_projected_parameter_rank: 1
    authority_effect: none

