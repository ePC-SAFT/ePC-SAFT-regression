  generated_file_policy: >-
    The accepted methane and local ethane fit receipts bind deterministic
    evidence to explicit artifacts. Build trees, caches, temporary replay
    receipts, and wheels remain outside the repository.
  oversized_files:
    - path: src/epcsaft_regression/native/pure_saturation_fit.cpp
      physical_lines: 920
    - path: src/epcsaft_regression/records.py
      physical_lines: 618
    - path: src/epcsaft_regression/workflow.py
