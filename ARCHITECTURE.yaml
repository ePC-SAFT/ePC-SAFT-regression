scope: >-
  Fit one strict pure methane, ethane, or propane saturation dataset per call through a
  shared lifted-volume Ceres formulation and the installed provider parameter-
  Hessian entry. Methane preserves the accepted 110, 130, 150, and 170 K fit.
  Ethane fits 140, 180, 220, and 260 K, holds out 120, 160, 200, and 240 K,
  and reports 100 and 280 K as domain stress. The authority-neutral propane
  candidate fits 150, 210, 270, and 330 K, holds out 18 interior rows, and
  reports 110 and 340 K as stress. The authority-neutral Figiel package
  candidate fits five current-catalog Born diameters to five reported-average
  targets through the installed Provider first-derivative callback. It passes
  its local gates after the user-approved descriptive-comparison correction
  and has no production authority.

